<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>متجري</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {font-family: Arial; background:#f5f5f5; margin:0; padding:20px;}
.products {display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px;}
.card {background:white; padding:15px; border-radius:10px; text-align:center;}
img {width:100%; height:150px; object-fit:cover;}
</style>
</head>
<body>

<h1>🛍️ متجري</h1>

<div id="products" class="products"></div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD4GGpTrC6htUcskMcECYM06zjKYQd7CmA",
    authDomain: "alaa-f520d.firebaseapp.com",
    projectId: "alaa-f520d",
    storageBucket: "alaa-f520d.firebasestorage.app",
    messagingSenderId: "14934832180",
    appId: "1:14934832180:web:e70c3503671c9d25228661"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadProducts() {
    const querySnapshot = await getDocs(collection(db, "products"));
    const container = document.getElementById("products");

    container.innerHTML = "";

    querySnapshot.forEach((doc) => {
      const product = doc.data();

      container.innerHTML += `
        <div class="card">
          <img src="${product.image}">
          <h3>${product.name}</h3>
          <p>${product.price}$</p>
        </div>
      `;
    });
  }

  loadProducts();
</script>
</body>
</html>
